name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  api:
    name: api · py compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Heavy ML deps (glasbey, scikit-image, material-color-utilities) take
      # 5+ minutes to build wheels in CI. We only need syntax verification
      # here — the full integration smoke runs against the actual deployment.
      - name: install lightweight deps for syntax check
        run: pip install fastapi pydantic email-validator python-multipart requests python-dotenv
      - name: byte-compile every .py
        run: |
          find . -name '*.py' -not -path './.venv/*' -print0 | xargs -0 python -m py_compile
